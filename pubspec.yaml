name: docklands_dojo
description: 'Kyokushin Karate training app — belt progression, technique library, spaced repetition, and grading quizzes.'
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.28
  go_router: ^14.8.1
  flutter_animate: ^4.5.2
  share_plus: ^10.1.4
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  flutter_local_notifications: ^18.0.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  drift_dev: ^2.25.0
  mocktail: ^1.0.4
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.5

flutter:
  uses-material-design: true

  # Fonts will be bundled as assets (NOT google_fonts).
